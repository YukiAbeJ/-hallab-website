<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="900">
  <defs>
    <filter id="marble" x="0%" y="0%" width="100%" height="100%" color-interpolation-filters="sRGB">
      <!-- 大きめの揺らぎ → 大理石の "雲" -->
      <feTurbulence type="fractalNoise"
        baseFrequency="0.0035 0.014"
        numOctaves="5"
        seed="22"
        result="noise"/>
      <!-- グレースケール化 -->
      <feColorMatrix type="saturate" values="0" in="noise" result="gray"/>
      <!-- 白基調に圧縮: 0.88〜1.00 の範囲にマッピング -->
      <feComponentTransfer in="gray" result="marble">
        <feFuncR type="linear" slope="0.12" intercept="0.88"/>
        <feFuncG type="linear" slope="0.12" intercept="0.88"/>
        <feFuncB type="linear" slope="0.085" intercept="0.915"/>
      </feComponentTransfer>
    </filter>
  </defs>
  <!-- ベース: 温かみのあるオフホワイト -->
  <rect width="900" height="900" fill="#f9f8f6"/>
  <!-- 大理石フィルター適用レイヤー -->
  <rect width="900" height="900" filter="url(#marble)" opacity="1"/>
</svg>
